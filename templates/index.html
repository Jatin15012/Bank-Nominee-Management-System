<!DOCTYPE html>
<html>
<head>
    <title>Bank Nominee System</title>

    <style>
        body {
            font-family: Arial;
            background: #eef3ff;
        }

        .box {
            width: 450px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #aaa;
        }

        input, select {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2d6cdf;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1b4db3;
        }

        a {
            display: block;
            margin-top: 10px;
            text-align: center;
        }

        .gender {
            margin: 10px 0;
        }

        .gender input {
            width: auto;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🏦 Bank Nominee System</h2>

    <form action="/add" method="POST">

        <input type="text" name="name" placeholder="Nominee Name" required>

        <div class="gender">
            <label><b>Gender:</b></label><br>
            <input type="radio" name="gender" value="Male" required> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>

        <input type="text" name="relation" placeholder="Relation" required>

        <input type="text" name="account" placeholder="Account Number" required>

        <label><b>Nominee Share Percentage</b></label>
        <select name="share_percentage" required>
            <option value="">Select Percentage</option>
            <option value="25%">25%</option>
            <option value="50%">50%</option>
            <option value="75%">75%</option>
            <option value="100%">100%</option>
        </select>

        <label><b>Nominee Type</b></label>
        <select name="nominee_type" required>
            <option value="">Select Type</option>
            <option value="Primary">Primary Nominee</option>
            <option value="Secondary">Secondary Nominee</option>
        </select>

        <button type="submit">Save Nominee</button>

    </form>

    <a href="/view">View All Nominees</a>

</div>

</body>
</html>
